apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kairos.fullname" . }}
  labels:
    {{- include "kairos.labels" . | nindent 4 }}
data:
  # Default environment variables for Spring Boot
  SPRING_APPLICATION_NAME: "kairos"
  {{- if not .Values.env.SPRING_DATASOURCE_URL }}
  # When using H2 (default), data is stored at /app/data/kairos
  SPRING_DATASOURCE_URL: "jdbc:h2:file:/app/data/kairos;AUTO_SERVER=TRUE"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.h2.Driver"
  {{- end }}
  {{- if not .Values.env.SPRING_DATASOURCE_USERNAME }}
  SPRING_DATASOURCE_USERNAME: "sa"
  {{- end }}
  {{- if not .Values.env.SPRING_JPA_HIBERNATE_DDL_AUTO }}
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  {{- end }}
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
  MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
