name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  packages: read
  pull-requests: write
  issues: write

jobs:
  versioning:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      image: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Calculate semantic version
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)"
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
            range="HEAD"
          else
            range="${latest_tag}..HEAD"
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            range="origin/${{ github.base_ref }}..HEAD"
          fi

          base_version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$base_version"

          messages="$(git log --pretty=format:%s $range || true)"

          if echo "$messages" | grep -Eq '^feat(\(.+\))?: '; then
            minor=$((minor + 1))
            patch=0
          elif echo "$messages" | grep -Eq '^fix(\(.+\))?: '; then
            patch=$((patch + 1))
          else
            patch=$((patch + 1))
          fi

          version="${major}.${minor}.${patch}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            version="${version}-pr.${{ github.event.number }}.${{ github.run_number }}"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  test-build:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    needs: versioning

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set Maven version
        run: mvn -B versions:set -DnewVersion=${{ needs.versioning.outputs.version }} -DgenerateBackupPoms=false

      - name: Run tests
        run: mvn -B test

      - name: Build JAR
        run: mvn -B -DskipTests package

  docker-build-scan:
    if: (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')) && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs:
      - versioning
      - test-build
    permissions:
      contents: read
      packages: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set Maven version
        run: mvn -B versions:set -DnewVersion=${{ needs.versioning.outputs.version }} -DgenerateBackupPoms=false

      - name: Build application JAR
        run: mvn -B -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (local)
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ needs.versioning.outputs.image }}:${{ needs.versioning.outputs.version }}

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ needs.versioning.outputs.image }}:${{ needs.versioning.outputs.version }}
          format: table
          output: trivy-report.txt
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.run_id }}
          path: trivy-report.txt

      - name: Add Trivy report to PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = fs.readFileSync('trivy-report.txt', 'utf8');
            const maxLen = 60000;
            if (report.length > maxLen) {
              report = report.slice(0, maxLen) + '\n... output truncated ...';
            }
            const body = [
              '## Trivy vulnerability report',
              '',
              `Image: ${{ needs.versioning.outputs.image }}:${{ needs.versioning.outputs.version }}`,
              '',
              '```text',
              report,
              '```'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker tags to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          image="${{ needs.versioning.outputs.image }}"
          version="${{ needs.versioning.outputs.version }}"
          short_sha="${GITHUB_SHA::7}"

          docker tag "$image:$version" "$image:latest"
          docker tag "$image:$version" "$image:main"
          docker tag "$image:$version" "$image:sha-$short_sha"

          docker push "$image:$version"
          docker push "$image:latest"
          docker push "$image:main"
          docker push "$image:sha-$short_sha"

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    needs:
      - versioning
      - test-build
      - docker-build-scan
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update CHANGELOG.md
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ needs.versioning.outputs.version }}"
          image="${{ needs.versioning.outputs.image }}:${{ needs.versioning.outputs.version }}"
          date="$(date -u +%Y-%m-%d)"

          previous_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)"
          if [ -n "$previous_tag" ]; then
            changes="$(git log --pretty=format:'- %s (%h)' "${previous_tag}..HEAD")"
          else
            changes="$(git log --pretty=format:'- %s (%h)')"
          fi

          if [ -z "$changes" ]; then
            changes='- No user-facing changes in this release.'
          fi

          {
            echo "## ${tag} - ${date}"
            echo
            echo "$changes"
            echo
            echo "Docker image: ${image}"
            echo
          } > .release_entry.md

          if [ -f CHANGELOG.md ]; then
            {
              head -n 1 CHANGELOG.md
              echo
              cat .release_entry.md
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.new.md
            mv CHANGELOG.new.md CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo
              cat .release_entry.md
            } > CHANGELOG.md
          fi

          {
            echo "release_body<<EOF"
            cat .release_entry.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit changelog
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): v${{ needs.versioning.outputs.version }} [skip ci]" || exit 0
          git push

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ needs.versioning.outputs.version }}"
          git tag -a "$tag" -m "Release $tag" || true
          git push origin "$tag" || true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.versioning.outputs.version }}
          name: v${{ needs.versioning.outputs.version }}
          body: ${{ steps.changelog.outputs.release_body }}
