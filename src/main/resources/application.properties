spring.application.name=kairos
app.version=@project.version@
spring.datasource.url=jdbc:h2:file:./kairos;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
spring.thymeleaf.cache=false

# Tomcat runtime tuning (container-friendly defaults, overridable via env)
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:80}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:10}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:100}
server.tomcat.max-connections=${SERVER_TOMCAT_MAX_CONNECTIONS:512}
server.tomcat.connection-timeout=${SERVER_TOMCAT_CONNECTION_TIMEOUT:300s}
server.tomcat.keep-alive-timeout=${SERVER_TOMCAT_KEEP_ALIVE_TIMEOUT:300s}
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# OpenAPI / Swagger UI
springdoc.swagger-ui.path=/api
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# API key JWT signing secret (change in production)
kairos.api-keys.jwt-secret=change-me-super-long-random-secret-at-least-32-bytes
