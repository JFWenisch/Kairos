<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairos Status</title>
    <meta http-equiv="refresh" th:content="${refreshSeconds}">
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: transparent;
            color: #0f172a;
        }

        .status-widget {
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.5rem 0.8rem;
            border: 1px solid #d0d7de;
            border-radius: 999px;
            background: #ffffff;
            font-size: 0.95rem;
            line-height: 1.2;
            white-space: nowrap;
        }

        .status-dot {
            width: 0.8rem;
            height: 0.8rem;
            border-radius: 50%;
            display: inline-block;
            flex: 0 0 auto;
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.45);
            animation: pulse 2.2s ease-out infinite;
        }

        .status-dot.ok {
            background: #198754;
            box-shadow: 0 0 0 0 rgba(25, 135, 84, 0.38);
        }

        .status-dot.incident {
            background: #dc3545;
            box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.45);
        }

        .status-text {
            font-weight: 600;
        }

        .status-count {
            color: #5b6678;
            font-size: 0.8rem;
            margin-left: 0.2rem;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 currentColor;
            }
            70% {
                box-shadow: 0 0 0 9px transparent;
            }
            100% {
                box-shadow: 0 0 0 0 transparent;
            }
        }

        @media (max-width: 460px) {
            .status-widget {
                padding: 0.42rem 0.65rem;
                font-size: 0.88rem;
            }
        }
    </style>
</head>
<body>
<div class="status-widget" role="status" aria-live="polite">
    <span class="status-dot"
          th:classappend="${hasActiveIncidents} ? ' incident' : ' ok'"
          aria-hidden="true"></span>
    <span class="status-text"
          th:text="${hasActiveIncidents} ? 'Active problems detected' : 'All systems operational'">
        All systems operational
    </span>
    <span class="status-count"
          th:if="${hasActiveIncidents}"
          th:text="'(' + ${activeOutages} + ' active incident' + (${activeOutages} == 1 ? '' : 's') + ')'">
        (1 active incident)
    </span>
</div>
</body>
</html>
