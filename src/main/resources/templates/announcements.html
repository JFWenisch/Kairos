<!DOCTYPE html>
<html lang="en" data-bs-theme="dark"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" th:href="@{/img/kairos.png}" type="image/png">
    <title>Kairos - Announcements</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/kairos.css}">
</head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0"><i class="bi bi-megaphone me-2"></i>Announcements</h1>
        <small class="text-muted">Sorted by created date</small>
    </div>

    <div th:if="${#lists.isEmpty(announcements)}" class="text-center py-5">
        <i class="bi bi-chat-left-text display-1 text-muted"></i>
        <p class="text-muted mt-3">No announcements available.</p>
    </div>

    <div th:unless="${#lists.isEmpty(announcements)}" class="vstack gap-3">
        <div th:each="announcement : ${announcements}"
             class="announcement-card p-3 rounded border"
             th:classappend="${announcement.kind.name() == 'INFORMATION'} ? ' announcement-information' : (${announcement.kind.name() == 'WARNING'} ? ' announcement-warning' : ' announcement-problem')">
            <div class="d-flex justify-content-between align-items-start mb-2 gap-3">
                <div>
                    <span class="badge"
                          th:classappend="${announcement.kind.name() == 'INFORMATION'} ? ' bg-info text-dark' : (${announcement.kind.name() == 'WARNING'} ? ' bg-warning text-dark' : ' bg-danger')"
                          th:text="${announcement.kind}">INFORMATION</span>
                    <span class="badge ms-2" th:classappend="${announcement.active} ? ' bg-success' : ' bg-secondary'"
                          th:text="${announcement.active} ? 'ACTIVE' : 'INACTIVE'">ACTIVE</span>
                </div>
                <small class="text-muted">
                    by <span th:text="${announcement.createdBy != null && !announcement.createdBy.isBlank()} ? ${announcement.createdBy} : 'Unknown'">Unknown</span>
                    ·
                    <span th:text="${announcement.createdAt != null} ? ${#temporals.format(announcement.createdAt, 'yyyy-MM-dd HH:mm')} : '-'">-</span>
                </small>
            </div>
            <div class="announcement-content" th:utext="${announcement.content}"></div>
            <small class="text-muted d-block mt-3" th:if="${announcement.activeUntil != null}">
                Active until <span th:text="${#temporals.format(announcement.activeUntil, 'yyyy-MM-dd HH:mm')}">-</span>
            </small>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/kairos.js}"></script>
</body>
</html>
