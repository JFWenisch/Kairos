<!DOCTYPE html>
<html lang="en" data-bs-theme="dark"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="adminHead(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Kairos Admin'">Admin - Kairos</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/kairos.css}">
</head>
<body>
<div th:fragment="adminLayout(title, content)">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-clock-history me-2"></i>Kairos
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}"><i class="bi bi-house me-1"></i>Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-link nav-link"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
                        </form>
                    </li>
                    <li class="nav-item ms-2">
                        <button class="btn btn-outline-secondary btn-sm" onclick="toggleDarkMode()">
                            <i class="bi bi-moon-stars-fill"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 min-vh-100 border-end py-3 bg-dark-subtle">
                <div class="d-flex flex-column">
                    <h6 class="text-uppercase text-muted fw-bold mb-3 px-2">Admin Panel</h6>
                    <a th:href="@{/admin/settings}"
                       th:classappend="${#httpServletRequest.requestURI.contains('/settings')} ? 'active' : ''"
                       class="nav-link px-2 py-2 rounded mb-1">
                        <i class="bi bi-sliders me-2"></i>General Settings
                    </a>
                    <a th:href="@{/admin/resources}"
                       th:classappend="${#httpServletRequest.requestURI.contains('/admin/resources')} ? 'active' : ''"
                       class="nav-link px-2 py-2 rounded mb-1">
                        <i class="bi bi-hdd-network me-2"></i>Manage Resources
                    </a>
                    <a th:href="@{/admin/resource-types}"
                       th:classappend="${#httpServletRequest.requestURI.contains('/resource-types')} ? 'active' : ''"
                       class="nav-link px-2 py-2 rounded mb-1">
                        <i class="bi bi-grid-3x3-gap me-2"></i>Resource Types
                    </a>
                    <a th:href="@{/admin/users}"
                       th:classappend="${#httpServletRequest.requestURI.contains('/users')} ? 'active' : ''"
                       class="nav-link px-2 py-2 rounded mb-1">
                        <i class="bi bi-people me-2"></i>Users
                    </a>
                    <a th:href="@{/admin/announcements}"
                       th:classappend="${#httpServletRequest.requestURI.contains('/announcements')} ? 'active' : ''"
                       class="nav-link px-2 py-2 rounded mb-1">
                        <i class="bi bi-megaphone me-2"></i>Announcements
                    </a>
                    <hr class="border-secondary my-2">
                    <a th:href="@{/api}"
                       class="nav-link px-2 py-2 rounded mb-1">
                        <i class="bi bi-braces me-2"></i>API Docs
                    </a>
                </div>
            </div>

            <div class="col-md-10 py-4 px-4">
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                    <span th:text="${successMessage}">Success</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                    <span th:text="${errorMessage}">Error</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:replace="${content}"></div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
