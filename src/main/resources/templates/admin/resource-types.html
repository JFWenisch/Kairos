<!DOCTYPE html>
<html lang="en" data-bs-theme="dark"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Types - Kairos Admin</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/kairos.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-clock-history me-2"></i>Kairos</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-house me-1"></i>Dashboard</a></li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-link nav-link"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
                    </form>
                </li>
                <li class="nav-item ms-2">
                    <button class="btn btn-outline-secondary btn-sm" onclick="toggleDarkMode()"><i class="bi bi-moon-stars-fill"></i></button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 min-vh-100 border-end py-3 bg-dark-subtle">
            <div class="d-flex flex-column">
                <h6 class="text-uppercase text-muted fw-bold mb-3 px-2">Admin Panel</h6>
                <a th:href="@{/admin/settings}" class="nav-link px-2 py-2 rounded mb-1"><i class="bi bi-sliders me-2"></i>General Settings</a>
                <a th:href="@{/admin/resources}" class="nav-link px-2 py-2 rounded mb-1"><i class="bi bi-hdd-network me-2"></i>Manage Resources</a>
                <a th:href="@{/admin/resource-types}" class="nav-link px-2 py-2 rounded mb-1 active"><i class="bi bi-grid-3x3-gap me-2"></i>Resource Types</a>
                <a th:href="@{/admin/users}" class="nav-link px-2 py-2 rounded mb-1"><i class="bi bi-people me-2"></i>Users</a>
                <a th:href="@{/admin/announcements}" class="nav-link px-2 py-2 rounded mb-1"><i class="bi bi-megaphone me-2"></i>Announcements</a>
                <a th:href="@{/admin/api-keys}" class="nav-link px-2 py-2 rounded mb-1"><i class="bi bi-key me-2"></i>API Keys</a>
            </div>
        </div>
        <div class="col-md-10 py-4 px-4">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}">Success</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <h2 class="h4 mb-4"><i class="bi bi-grid-3x3-gap me-2"></i>Resource Type Configuration</h2>

            <div th:each="config : ${configs}" class="card mb-3">
                <div class="card-header">
                    <strong th:text="${config.typeName}">TYPE</strong>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/resource-types/update}" method="post">
                        <input type="hidden" name="id" th:value="${config.id}">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Check Interval (minutes)</label>
                                <input type="number" class="form-control" name="checkIntervalMinutes"
                                       th:value="${config.checkIntervalMinutes}" min="1" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Parallelism (threads)</label>
                                <input type="number" class="form-control" name="parallelism"
                                       th:value="${config.parallelism}" min="1" max="20" required>
                            </div>
                            <div class="col-md-4 d-flex align-items-end">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-save me-1"></i>Update
                                </button>
                            </div>
                        </div>
                    </form>

                    <!-- Authentication credentials section -->
                    <hr class="my-3">
                    <h6 class="mb-3"><i class="bi bi-shield-lock me-2"></i>Authentication Credentials</h6>

                    <!-- Existing auths table -->
                    <div th:if="${!config.authentications.isEmpty()}" class="mb-3">
                        <table class="table table-sm table-bordered align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Name</th>
                                    <th>Type</th>
                                    <th>URL Pattern</th>
                                    <th>Username</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="auth : ${config.authentications}">
                                    <td th:text="${auth.name}"></td>
                                    <td><span class="badge bg-secondary" th:text="${auth.authType}">BASIC</span></td>
                                    <td><code th:text="${auth.urlPattern}"></code></td>
                                    <td th:text="${auth.username}"></td>
                                    <td>
                                        <form th:action="@{'/admin/resource-types/auth/delete/' + ${auth.id}}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-danger btn-sm"
                                                    onclick="return confirm('Delete this authentication?')">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <p th:if="${config.authentications.isEmpty()}" class="text-muted small">
                        No authentication credentials configured.
                    </p>

                    <!-- Add new auth form -->
                    <button class="btn btn-outline-success btn-sm mb-2"
                            type="button"
                            th:data-bs-target="${'#addAuthCollapse-' + config.id}"
                            data-bs-toggle="collapse">
                        <i class="bi bi-plus-circle me-1"></i>Add Authentication
                    </button>
                    <div th:id="${'addAuthCollapse-' + config.id}" class="collapse">
                        <div class="card card-body bg-dark-subtle mt-2">
                            <form th:action="@{'/admin/resource-types/' + ${config.id} + '/auth/add'}" method="post">
                                <div class="row g-2">
                                    <div class="col-md-3">
                                        <label class="form-label">Name</label>
                                        <input type="text" class="form-control form-control-sm" name="name"
                                               placeholder="e.g. My Registry" required>
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">URL / Target Pattern</label>
                                        <input type="text" class="form-control form-control-sm" name="urlPattern"
                                               placeholder="e.g. https://example.com*" required>
                                        <div class="form-text">Use <code>*</code> as a trailing wildcard.</div>
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Username</label>
                                        <input type="text" class="form-control form-control-sm" name="username"
                                               required autocomplete="off">
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Password</label>
                                        <input type="password" class="form-control form-control-sm" name="password"
                                               required autocomplete="new-password">
                                    </div>
                                    <div class="col-md-2 d-flex align-items-end">
                                        <button type="submit" class="btn btn-success btn-sm w-100">
                                            <i class="bi bi-check-lg me-1"></i>Save
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/kairos.js}"></script>
</body>
</html>
