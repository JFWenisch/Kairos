<!DOCTYPE html>
<html lang="en" data-bs-theme="dark"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" th:href="@{/img/kairos.png}" type="image/png">
    <title>Outages - Kairos Admin</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/kairos.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold d-flex align-items-center" th:href="@{/}"><img th:src="@{/img/kairos.png}" alt="Kairos" height="28" class="me-2"><span>Kairos</span></a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-house me-1"></i>Dashboard</a></li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-link nav-link"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
                    </form>
                </li>
                <li class="nav-item ms-2">
                    <button class="btn btn-outline-secondary btn-sm" onclick="toggleDarkMode()"><i class="bi bi-moon-stars-fill"></i></button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 min-vh-100 border-end py-3 bg-dark-subtle">
            <div class="d-flex flex-column">
                <h6 class="text-uppercase text-muted fw-bold mb-3 px-2">Admin Panel</h6>
                <a th:href="@{/admin/settings}" class="nav-link px-2 py-2 rounded mb-1"><i class="bi bi-sliders me-2"></i>General Settings</a>
                <a th:href="@{/admin/resources}" class="nav-link px-2 py-2 rounded mb-1"><i class="bi bi-hdd-network me-2"></i>Manage Resources</a>
                <a th:href="@{/admin/resource-types}" class="nav-link px-2 py-2 rounded mb-1"><i class="bi bi-grid-3x3-gap me-2"></i>Resource Types</a>
                <a th:href="@{/admin/outages}" class="nav-link px-2 py-2 rounded mb-1 active"><i class="bi bi-exclamation-triangle me-2"></i>Outages</a>
                <a th:href="@{/admin/users}" class="nav-link px-2 py-2 rounded mb-1"><i class="bi bi-people me-2"></i>Users</a>
                <a th:href="@{/admin/announcements}" class="nav-link px-2 py-2 rounded mb-1"><i class="bi bi-megaphone me-2"></i>Announcements</a>
                <a th:href="@{/admin/api-keys}" class="nav-link px-2 py-2 rounded mb-1"><i class="bi bi-key me-2"></i>API Keys</a>
            </div>
        </div>

        <div class="col-md-10 py-4 px-4">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}">Success</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${errorMessage}">Error</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <h2 class="h4 mb-4"><i class="bi bi-exclamation-triangle me-2"></i>Outages</h2>

            <div class="card">
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(outages)}" class="p-3 text-muted">
                        No outages recorded yet.
                    </div>
                    <table class="table table-hover mb-0" th:unless="${#lists.isEmpty(outages)}">
                        <thead>
                            <tr>
                                <th>Resource</th>
                                <th>Status</th>
                                <th>Start</th>
                                <th>End</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="outage : ${outages}">
                                <td>
                                    <a th:href="@{/resources/{id}(id=${outage.resource.id})}"
                                       class="text-decoration-none fw-semibold"
                                       th:text="${outage.resource.name}">Resource</a>
                                    <small class="text-muted ms-2" th:text="${outage.resource.resourceType}">TYPE</small>
                                </td>
                                <td>
                                    <span th:if="${outage.active}" class="badge bg-danger">
                                        <i class="bi bi-circle-fill me-1" style="font-size:.6rem;"></i>Active
                                    </span>
                                    <span th:unless="${outage.active}" class="badge bg-success">
                                        <i class="bi bi-check-circle me-1"></i>Resolved
                                    </span>
                                </td>
                                <td th:text="${#temporals.format(outage.startDate, 'yyyy-MM-dd HH:mm:ss')}">-</td>
                                <td>
                                    <span th:if="${outage.endDate != null}"
                                          th:text="${#temporals.format(outage.endDate, 'yyyy-MM-dd HH:mm:ss')}">-</span>
                                    <span th:unless="${outage.endDate != null}" class="text-muted fst-italic">ongoing</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/kairos.js}"></script>
</body>
</html>
