<!DOCTYPE html>
<html lang="en" data-bs-theme="dark"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${vm.resource.name} + ' - Kairos'">Resource - Kairos</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/kairos.css}">
</head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container-fluid py-4 resource-detail" th:attr="data-resource-id=${vm.resource.id}">
    <div class="mb-3">
        <a th:href="@{/}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
        </a>
    </div>

    <div class="row mb-4">
        <div class="col">
            <div class="d-flex align-items-center">
                <span data-role="status-dot" th:class="'status-dot-lg me-3 status-' + ${vm.currentStatus}"></span>
                <div>
                    <h1 class="h2 mb-0" th:text="${vm.resource.name}">Resource Name</h1>
                    <p class="text-muted mb-0">
                        <span class="badge bg-secondary me-2" th:text="${vm.resource.resourceType}">TYPE</span>
                        <code th:text="${vm.resource.target}">target</code>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Uptime Stats -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Last 24 Hours</h5>
                    <div class="display-6 fw-bold resource-uptime"
                         th:text="${#numbers.formatDecimal(uptime24h, 1, 1)} + '%'"
                         th:classappend="${uptime24h >= 99} ? 'text-success' : (${uptime24h >= 95} ? 'text-warning' : 'text-danger')">
                        99.9%
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Last 7 Days</h5>
                    <div class="display-6 fw-bold"
                         th:text="${#numbers.formatDecimal(uptime7d, 1, 1)} + '%'"
                         th:classappend="${uptime7d >= 99} ? 'text-success' : (${uptime7d >= 95} ? 'text-warning' : 'text-danger')">
                        99.9%
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title">Last 30 Days</h5>
                    <div class="display-6 fw-bold"
                         th:text="${#numbers.formatDecimal(uptime30d, 1, 1)} + '%'"
                         th:classappend="${uptime30d >= 99} ? 'text-success' : (${uptime30d >= 95} ? 'text-warning' : 'text-danger')">
                        99.9%
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Timeline -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-bar-chart-line me-2"></i>24-Hour Timeline</h5>
        </div>
        <div class="card-body">
            <div class="timeline-container">
                <span th:each="block : ${vm.timelineBlocks}"
                      th:class="'timeline-block ' + ${block}"
                      th:title="${block}"></span>
            </div>
            <div class="d-flex justify-content-between mt-1">
                <small class="text-muted">24 hours ago</small>
                <small class="text-muted">Now</small>
            </div>
        </div>
    </div>

    <!-- Recent History -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>Recent Check History</h5>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(recentHistory)}" class="p-3 text-muted">
                No check history available yet.
            </div>
            <table class="table table-sm mb-0" th:unless="${#lists.isEmpty(recentHistory)}">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Message</th>
                        <th>Code</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="result : ${recentHistory}">
                        <td th:text="${#temporals.format(result.checkedAt, 'yyyy-MM-dd HH:mm:ss')}">time</td>
                        <td>
                            <span th:class="'badge ' + (${result.status.name() == 'AVAILABLE'} ? 'bg-success' : (${result.status.name() == 'NOT_AVAILABLE'} ? 'bg-danger' : 'bg-secondary'))"
                                  th:text="${result.status}">STATUS</span>
                        </td>
                        <td th:text="${result.message}">message</td>
                        <td th:text="${result.errorCode}">code</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/kairos.js}"></script>
</body>
</html>
